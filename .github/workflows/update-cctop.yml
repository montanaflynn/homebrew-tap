name: update-cctop

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        run: |
          # Get latest release tag
          TAG=$(gh api repos/montanaflynn/cctop/releases/latest --jq '.tag_name')
          echo "Latest release: $TAG"

          # Download source and compute SHA256
          URL="https://github.com/montanaflynn/cctop/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | cut -d' ' -f1)
          echo "SHA256: $SHA"

          # Update formula
          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/cctop.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/cctop.rb

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cctop.rb
          git commit -m "chore: update cctop to ${TAG}" || echo "No changes"
          git push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
