name: Update cctop formula

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for new cctop release
        id: check
        run: |
          LATEST=$(curl -s https://api.github.com/repos/montanaflynn/cctop/releases/latest | jq -r .tag_name)
          CURRENT=$(grep -oP 'v[\d.]+' Formula/cctop.rb | head -1)
          echo "latest=$LATEST"
          echo "current=$CURRENT"
          if [ "$LATEST" != "$CURRENT" ]; then
            echo "update=true" >> $GITHUB_OUTPUT
            echo "version=$LATEST" >> $GITHUB_OUTPUT
          else
            echo "update=false" >> $GITHUB_OUTPUT
          fi

      - name: Update formula
        if: steps.check.outputs.update == 'true'
        run: |
          VERSION=${{ steps.check.outputs.version }}
          URL="https://github.com/montanaflynn/cctop/archive/refs/tags/${VERSION}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)

          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/cctop.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/cctop.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cctop.rb
          git commit -m "Update cctop to ${VERSION}"
          git push
