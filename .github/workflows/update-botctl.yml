name: Update botctl formula

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Get latest release
        id: release
        run: |
          LATEST=$(curl -s https://api.github.com/repos/montanaflynn/botctl/releases/latest | jq -r .tag_name)
          VERSION="${LATEST#v}"
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256s
        id: sha
        run: |
          TAG=${{ steps.release.outputs.tag }}
          BASE="https://github.com/montanaflynn/botctl/releases/download/${TAG}"
          echo "macos_arm=$(curl -fsSL ${BASE}/botctl-${TAG}-darwin-arm64.tar.gz | sha256sum | cut -d\  -f1)" >> "$GITHUB_OUTPUT"
          echo "macos_amd=$(curl -fsSL ${BASE}/botctl-${TAG}-darwin-amd64.tar.gz | sha256sum | cut -d\  -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_amd=$(curl -fsSL ${BASE}/botctl-${TAG}-linux-amd64.tar.gz  | sha256sum | cut -d\  -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_arm=$(curl -fsSL ${BASE}/botctl-${TAG}-linux-arm64.tar.gz  | sha256sum | cut -d\  -f1)" >> "$GITHUB_OUTPUT"

      - name: Update formula
        run: |
          cat > Formula/botctl.rb << FORMULA
          class Botctl < Formula
            desc "Process manager for autonomous AI agent bots"
            homepage "https://github.com/montanaflynn/botctl"
            version "${{ steps.release.outputs.version }}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/montanaflynn/botctl/releases/download/v#{version}/botctl-v#{version}-darwin-arm64.tar.gz"
                sha256 "${{ steps.sha.outputs.macos_arm }}"
              end
              on_intel do
                url "https://github.com/montanaflynn/botctl/releases/download/v#{version}/botctl-v#{version}-darwin-amd64.tar.gz"
                sha256 "${{ steps.sha.outputs.macos_amd }}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/montanaflynn/botctl/releases/download/v#{version}/botctl-v#{version}-linux-amd64.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_amd }}"
              end
              on_arm do
                url "https://github.com/montanaflynn/botctl/releases/download/v#{version}/botctl-v#{version}-linux-arm64.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_arm }}"
              end
            end

            def install
              bin.install "botctl"
            end

            test do
              assert_match "botctl", shell_output("#{bin}/botctl --version 2>&1")
            end
          end
          FORMULA
          sed -i "s/^          //" Formula/botctl.rb
          cat Formula/botctl.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/botctl.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update botctl to ${{ steps.release.outputs.version }}"
          git push
