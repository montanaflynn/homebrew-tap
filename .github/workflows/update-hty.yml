name: Update hty formula

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Get latest release
        id: release
        run: |
          LATEST=$(curl -s https://api.github.com/repos/montanaflynn/hty/releases/latest | jq -r .tag_name)
          VERSION="${LATEST#v}"
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256s
        id: sha
        run: |
          TAG=${{ steps.release.outputs.tag }}
          BASE="https://github.com/montanaflynn/hty/releases/download/${TAG}"
          echo "macos_arm=$(curl -fsSL ${BASE}/hty-aarch64-macos.tar.gz | sha256sum | cut -d\  -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_amd=$(curl -fsSL ${BASE}/hty-x86_64-linux.tar.gz | sha256sum | cut -d\  -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_arm=$(curl -fsSL ${BASE}/hty-aarch64-linux.tar.gz | sha256sum | cut -d\  -f1)" >> "$GITHUB_OUTPUT"

      - name: Update formula
        run: |
          cat > Formula/hty.rb << FORMULA
          class Hty < Formula
            desc "Interactive terminal automation for AI agents"
            homepage "https://github.com/montanaflynn/hty"
            version "${{ steps.release.outputs.version }}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/montanaflynn/hty/releases/download/v#{version}/hty-aarch64-macos.tar.gz"
                sha256 "${{ steps.sha.outputs.macos_arm }}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/montanaflynn/hty/releases/download/v#{version}/hty-x86_64-linux.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_amd }}"
              end
              on_arm do
                url "https://github.com/montanaflynn/hty/releases/download/v#{version}/hty-aarch64-linux.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_arm }}"
              end
            end

            def install
              bin.install "hty"
            end

            test do
              assert_match "Usage", shell_output("#{bin}/hty --help")
            end
          end
          FORMULA
          sed -i "s/^          //" Formula/hty.rb
          cat Formula/hty.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/hty.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update hty to ${{ steps.release.outputs.version }}"
          git push
